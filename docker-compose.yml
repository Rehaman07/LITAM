version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: litam_postgres
    restart: always
    environment:
      POSTGRES_DB: litam_db
      POSTGRES_USER: litam_user
      POSTGRES_PASSWORD: litam_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litam_user -d litam_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  cache:
    image: redis:7-alpine
    container_name: litam_redis
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: litam_api
    restart: always
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_data &&
             python manage.py collectstatic --noinput &&
             gunicorn --bind 0.0.0.0:8000 config.wsgi:application"
    environment:
      - POSTGRES_DB=litam_db
      - POSTGRES_USER=litam_user
      - POSTGRES_PASSWORD=litam_password
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://cache:6379/1
      - DJANGO_DEBUG=False
      - ALLOWED_HOSTS=*
    volumes:
      - django_static:/app/staticfiles
      - django_media:/app/media
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: web.Dockerfile
    container_name: litam_web
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api
    volumes:
      - django_static:/app/staticfiles
      - django_media:/app/media

volumes:
  postgres_data:
  redis_data:
  django_static:
  django_media:
